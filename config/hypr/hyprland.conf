# Winux-ISO Hyprland Config
# Stylizowany na zblizony do Windows 11

monitor=,preferred,auto,auto

exec-once = waybar & swww init & thunar --daemon
# ewentualnie inny bar - np. hyprpaper + nwg-panel, dla prostoty mozesz załadować podstawy
env = XCURSOR_SIZE,24
env = GTK_THEME,WhiteSur-Light

input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    drop_shadow = yes
    shadow_range = 10
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# Win+E otwiera manedzer plikow (Thunar)
bind = SUPER, E, exec, thunar

# Win+Q zamyka okno
bind = SUPER, Q, killactive, 

# Prawy klik na pulpicie to czesto hyprland nie ma tego bezposrednio dla menu context,
# Ale Win+Spacja / Win+D do wyszukiwarki:
# (brak wbudowanej wyszukiwarki tu, mozna podpiąć wofi lub rofi)

# Wyjscie
bind = SUPER SHIFT, M, exit, 

# Poruszanie się
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
