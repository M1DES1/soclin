---
message: "Cleaning live-only session..."
dontChroot: false
timeout: 120
script:
  - command: /bin/sh -c "rm -f /usr/local/bin/soclin-launch-installer /usr/local/bin/soclin-live-session /usr/share/xsessions/soclin-live.desktop /etc/sudoers.d/live-nopasswd /etc/sddm.conf.d/autologin.conf"
    timeout: 10
  - command: /bin/sh -c "userdel -r live >/dev/null 2>&1 || true"
    timeout: 20
  - command: /bin/sh -c "systemctl set-default graphical.target || true"
    timeout: 20
