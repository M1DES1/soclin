---
message: "Cleaning live-only session..."
dontChroot: false
timeout: 120
script:
  - command: /bin/sh -c "rm -f /usr/local/bin/soclin-launch-installer /etc/sudoers.d/live-nopasswd"
    timeout: 10
  - command: /bin/sh -c "rm -f /etc/systemd/system/getty@tty1.service.d/autologin.conf && rmdir --ignore-fail-on-non-empty /etc/systemd/system/getty@tty1.service.d || true"
    timeout: 10
  - command: /bin/sh -c "userdel -r live >/dev/null 2>&1 || true"
    timeout: 20
  - command: /bin/sh -c "systemctl set-default graphical.target || true"
    timeout: 20
