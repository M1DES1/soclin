---
message: "Cleaning live-only session..."
dontChroot: false
timeout: 120
script:
  - command: /bin/sh -c "rm -f /usr/local/bin/soclin-launch-installer /usr/local/bin/soclin-live-session /usr/local/bin/soclin-prepare-live-session /usr/local/bin/soclin-debug-sddm-state /usr/share/xsessions/soclin-live.desktop /etc/systemd/system/soclin-prepare-live-session.service /etc/systemd/system/soclin-debug-sddm-state.service /etc/sudoers.d/live-nopasswd /etc/sddm.conf /etc/sddm.conf.d/autologin.conf /etc/sddm.conf.d/soclin.conf /etc/sddm.conf.d/00-soclin-live.conf /etc/sddm.conf.d/99-soclin-live.conf"
    timeout: 10
  - command: /bin/sh -c "userdel -r live >/dev/null 2>&1 || true"
    timeout: 20
  - command: /bin/sh -c "systemctl set-default graphical.target || true"
    timeout: 20
