set default=0
set timeout=5

if loadfont /boot/grub/font.pf2; then
  set gfxmode=1024x768
  insmod gfxterm
  terminal_output gfxterm
fi

menuentry "Start WinUX Live" {
  linux /live/vmlinuz boot=live components quiet splash noeject username=winux
  initrd /live/initrd.img
}

menuentry "Start WinUX Live (Safe Graphics)" {
  linux /live/vmlinuz boot=live components quiet splash nomodeset noeject username=winux
  initrd /live/initrd.img
}
