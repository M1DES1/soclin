name: Build WinUX ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    # ISO może ważyć 3-4 GB — domyślny limit artefaktów to 10 GB, OK
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Napraw line endings (CRLF → LF) ──────────────────────────────────
      # Pliki edytowane na Windows mają \r\n — bash je odrzuca jako "bad interpreter"
      - name: Fix line endings (CRLF → LF)
        run: |
          sudo apt-get install -y dos2unix -q
          find . -name "*.chroot" -o -name "*.binary" -o -name "config" \
            | xargs dos2unix --quiet 2>/dev/null || true
          dos2unix auto/config || true

      # ── 2. Czyszczenie cache apt i update
      - name: Clean apt cache and update
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -qq

      # ── 2b. Zainstaluj live-build i zależności ───────────────────────────────
      - name: Install live-build and dependencies
        run: |
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            isolinux \
            syslinux-common \
            --no-install-recommends -qq

      # ── 3. Skonfiguruj live-build ────────────────────────────────────────────
      - name: Configure live-build (lb config)
        run: |
          chmod +x auto/config
          sudo bash auto/config 2>&1 | tee /tmp/lb-config.log

      # ── 4. Zbuduj ISO ───────────────────────────────────────────────────────
      # lb build robi: bootstrap → chroot (hooki) → binary (ISO)
      - name: Build ISO (lb build)
        run: |
          # Pokaż logi na bieżąco żeby widzieć gdzie się zatrzymuje
          sudo lb build 2>&1 | tee /tmp/lb-build.log
        env:
          DEBIAN_FRONTEND: noninteractive

      # ── 5. Znajdź wynikowy ISO ───────────────────────────────────────────────
      - name: Locate built ISO
        id: find_iso
        run: |
          ISO=$(find . -maxdepth 2 -name "*.iso" | head -n1)
          if [ -z "$ISO" ]; then
            echo "❌ Nie znaleziono ISO! Ostatnie 100 linii loga:"
            tail -100 /tmp/lb-build.log
            echo ""
            echo "📋 Logi konfiguracji:"
            tail -50 /tmp/lb-config.log || true
            exit 1
          fi
          echo "iso_path=$ISO" >> $GITHUB_OUTPUT
          ls -lh "$ISO"
          echo "✅ ISO: $ISO"

      # ── 6. Upload artefaktu ──────────────────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: winux-iso
          path: ${{ steps.find_iso.outputs.iso_path }}
          retention-days: 7

      # ── 7. Upload logów jeśli build padł ────────────────────────────────────
      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            /tmp/lb-build.log
            /tmp/lb-config.log
          retention-days: 3
