name: Build WinUX ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "auto/**"
      - "config/**"
      - "build.sh"
      - ".github/workflows/build-iso.yml"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ hashFiles('config/package-lists/*.chroot') }}
          restore-keys: apt-

      - name: Install host dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
            rsync wget curl git ca-certificates gnupg2 jq \
            software-properties-common apt-transport-https

      - name: Build ISO
        run: |
          chmod +x build.sh auto/config
          find config/hooks/normal -type f -name "*.chroot" -exec chmod +x {} \;
          find config/includes.chroot -type f -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
          ./build.sh

      - name: Collect artifacts
        run: |
          mkdir -p out
          find . -maxdepth 1 -type f -name "*.iso" -exec cp {} out/ \;
          ls -lah out
          echo "### ISO Build Results" >> $GITHUB_STEP_SUMMARY
          for f in out/*.iso; do
            SIZE=$(du -sh "$f" | cut -f1)
            echo "- **$(basename $f)**: $SIZE" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: winux-iso
          path: out/*.iso
          if-no-files-found: error
          retention-days: 14
