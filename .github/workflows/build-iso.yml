name: Build WinUX ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "github/iso-build/**"
      - ".github/workflows/build-iso.yml"

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI workspace
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/winux-iso"
          cp -a github/iso-build/. "$RUNNER_TEMP/winux-iso/"
          chmod +x "$RUNNER_TEMP/winux-iso/build.sh"
          chmod +x "$RUNNER_TEMP/winux-iso/auto/config"

      - name: Build ISO
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/winux-iso"
          ./build.sh |& tee "$GITHUB_WORKSPACE/build-github.log"

      - name: Collect artifacts
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          find "$RUNNER_TEMP/winux-iso" -maxdepth 1 -name "*.iso" -exec cp {} "$GITHUB_WORKSPACE/artifacts/" \;
          cp "$GITHUB_WORKSPACE/build-github.log" "$GITHUB_WORKSPACE/artifacts/" || true

      - name: Upload ISO and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winux-iso-build
          path: artifacts/
          if-no-files-found: warn
